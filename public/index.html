<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css?v=13" />
  </head>
  <body>
    <main class="app">
      <section class="auth-screen" id="authScreen">
        <div class="auth-card">
          <div class="logo" aria-hidden="true">M</div>
          <h1>Mini Chat</h1>
          <p>注册或登录账号，在同一个网络里的其他设备也可以进入聊天。</p>
          <form id="authForm">
            <input id="nameInput" name="name" autocomplete="nickname" placeholder="昵称（注册时填写）" />
            <input id="usernameInput" name="username" autocomplete="username" placeholder="账号，例如 qz" required />
            <input id="passwordInput" name="password" autocomplete="current-password" type="password" placeholder="密码，至少 4 位" required />
            <div class="auth-actions">
              <button class="primary" type="submit" data-action="login">登录</button>
              <button type="button" id="registerButton">注册</button>
            </div>
          </form>
          <p class="hint" id="authHint">账号只能用英文、数字和下划线。</p>
        </div>
      </section>

      <section class="chat-shell hidden" id="chatShell">
        <aside class="sidebar">
          <header class="profile">
            <div class="avatar" id="myAvatar">M</div>
            <div>
              <strong id="myName">Mini</strong>
              <span id="myUsername">@mini</span>
            </div>
            <div class="profile-actions">
              <button id="openSettingsButton" type="button" aria-label="设置">设置</button>
              <button id="logoutButton" type="button">退出</button>
            </div>
          </header>

          <form class="add-contact" id="addContactForm">
            <input id="contactInput" placeholder="输入账号加好友" autocomplete="off" />
            <button type="submit">添加</button>
          </form>

          <div class="section-title">会话</div>
          <input class="thread-search" id="threadSearchInput" placeholder="搜索会话" autocomplete="off" />
          <div class="contacts" id="threads"></div>
        </aside>

        <section class="conversation">
          <header class="chat-head">
            <button class="back-button" id="backButton" type="button">‹</button>
            <div class="avatar small" id="peerAvatar">?</div>
            <div>
              <strong id="peerName">选择一个联系人</strong>
              <span id="peerStatus">消息会自动刷新</span>
            </div>
            <div class="chat-actions">
              <button id="toggleSearchButton" type="button" disabled>搜索</button>
            </div>
          </header>

          <div class="message-search hidden" id="messageSearchBar">
            <input id="messageSearchInput" placeholder="搜索当前聊天内容" autocomplete="off" />
            <button id="clearMessageSearchButton" type="button">清除</button>
          </div>

          <div class="messages empty" id="messages">
            <div class="empty-state">
              <strong>开始聊天</strong>
              <span>添加一个账号，或选择左侧联系人。</span>
            </div>
          </div>

          <div class="sticker-panel hidden" id="stickerPanel" aria-label="表情包"></div>
          <form class="composer" id="messageForm">
            <button class="sticker-toggle" id="stickerToggle" type="button" disabled>表情</button>
            <input id="messageInput" placeholder="输入消息" autocomplete="off" disabled />
            <button class="primary" type="submit" disabled id="sendButton">发送</button>
          </form>
        </section>
      </section>

      <section class="settings-overlay hidden" id="settingsOverlay" aria-label="设置">
        <article class="settings-card">
          <header class="settings-head">
            <div>
              <span>Mini Chat</span>
              <h2>设置</h2>
            </div>
            <button id="closeSettingsButton" type="button">关闭</button>
          </header>

          <nav class="settings-tabs" aria-label="设置分类">
            <button class="active" type="button" data-settings-tab="profile">账号</button>
            <button type="button" data-settings-tab="friends">好友</button>
            <button type="button" data-settings-tab="appearance">外观</button>
            <button type="button" data-settings-tab="groups">群聊</button>
            <button type="button" data-settings-tab="tools">工具</button>
          </nav>

          <section class="settings-panel active" data-settings-panel="profile">
            <form class="settings-form" id="profileForm">
              <label>
                <span>昵称</span>
                <input id="profileNameInput" placeholder="昵称" autocomplete="nickname" />
              </label>
              <label>
                <span>状态</span>
                <input id="profileStatusInput" placeholder="例如：在线" autocomplete="off" />
              </label>
              <div>
                <span class="field-title">头像颜色</span>
                <div class="color-grid" id="profileColorGrid">
                  <button type="button" data-profile-color="#0a84ff" style="--swatch:#0a84ff"></button>
                  <button type="button" data-profile-color="#32d74b" style="--swatch:#32d74b"></button>
                  <button type="button" data-profile-color="#ff9f0a" style="--swatch:#ff9f0a"></button>
                  <button type="button" data-profile-color="#bf5af2" style="--swatch:#bf5af2"></button>
                  <button type="button" data-profile-color="#ff375f" style="--swatch:#ff375f"></button>
                </div>
              </div>
              <button class="primary" type="submit">保存资料</button>
            </form>
          </section>

          <section class="settings-panel" data-settings-panel="friends">
            <div class="section-title">好友申请</div>
            <div class="request-list" id="friendRequestList">
              <div class="empty-state"><span>暂无好友申请。</span></div>
            </div>
          </section>

          <section class="settings-panel" data-settings-panel="appearance">
            <section class="wallpaper-panel" aria-label="壁纸设置">
              <div class="section-title">壁纸</div>
              <div class="wallpaper-grid" id="wallpaperGrid">
                <button type="button" data-wallpaper="aurora">极光</button>
                <button type="button" data-wallpaper="mist">薄雾</button>
                <button type="button" data-wallpaper="sunset">日落</button>
                <button type="button" data-wallpaper="plain">纯色</button>
              </div>
              <label class="file-wallpaper">
                <input id="wallpaperFileInput" type="file" accept="image/*" />
                <span>选择自己的图片</span>
              </label>
            </section>
            <div class="settings-list">
              <label class="switch-row">
                <span>白色模式</span>
                <input id="themeToggle" type="checkbox" />
              </label>
              <label class="switch-row">
                <span>紧凑模式</span>
                <input id="compactToggle" type="checkbox" />
              </label>
              <label class="switch-row">
                <span>新消息提示</span>
                <input id="notifyToggle" type="checkbox" />
              </label>
            </div>
          </section>

          <section class="settings-panel" data-settings-panel="groups">
            <form class="group-form" id="groupForm">
              <input id="groupNameInput" placeholder="群名" autocomplete="off" />
              <input id="groupMembersInput" placeholder="成员账号，用逗号分隔" autocomplete="off" />
              <button class="primary" type="submit">创建群聊</button>
            </form>
          </section>

          <section class="settings-panel" data-settings-panel="tools">
            <div class="tool-grid">
              <button class="mini-game-button" id="openGameButton" type="button">
                <span>Fruit Slasher</span>
                <small>30 秒切水果</small>
              </button>
              <button class="mini-game-button snake-button" id="openSnakeButton" type="button">
                <span>Snake</span>
                <small>吃苹果，别撞墙</small>
              </button>
              <button class="mini-game-button video-button" id="openVideoButton" type="button">
                <span>Video Feed</span>
                <small>YouTube 刷视频</small>
              </button>
              <button class="mini-game-button map-button" id="openMapButton" type="button">
                <span>Google Maps</span>
                <small>地图搜索</small>
              </button>
              <button class="mini-game-button gmail-button" id="openGmailButton" type="button">
                <span>Gmail</span>
                <small>打开邮箱</small>
              </button>
            </div>
          </section>
        </article>
      </section>

      <section class="game-overlay hidden" id="gameOverlay" aria-label="Fruit Slasher mini game">
        <article class="game-card">
          <div class="game-head">
            <div>
              <span>Mini Game</span>
              <h2>Fruit Slasher</h2>
            </div>
            <button id="closeGameButton" type="button">关闭</button>
          </div>
          <div class="game-stats">
            <div><span>分数</span><strong id="gameScore">0</strong></div>
            <div><span>时间</span><strong id="gameTime">30</strong></div>
            <div><span>连击</span><strong id="gameCombo">x1</strong></div>
          </div>
          <canvas id="fruitGame" width="720" height="420" aria-label="Fruit Slasher canvas"></canvas>
          <div class="game-actions">
            <button id="restartGameButton" type="button">重新开始</button>
            <p id="gameHint">拖动鼠标或手指划过水果，避开炸弹。</p>
          </div>
        </article>
      </section>

      <section class="game-overlay hidden" id="snakeOverlay" aria-label="Snake mini game">
        <article class="game-card snake-card">
          <div class="game-head">
            <div>
              <span>Mini Game</span>
              <h2>Snake</h2>
            </div>
            <button id="closeSnakeButton" type="button">关闭</button>
          </div>
          <div class="game-stats">
            <div><span>分数</span><strong id="snakeScore">0</strong></div>
            <div><span>最高</span><strong id="snakeBest">0</strong></div>
            <div><span>速度</span><strong id="snakeSpeed">1</strong></div>
          </div>
          <canvas id="snakeGame" width="560" height="560" tabindex="0" aria-label="Snake canvas"></canvas>
          <div class="snake-controls" aria-label="Snake controls">
            <button type="button" data-snake-dir="0,-1">上</button>
            <button type="button" data-snake-dir="-1,0">左</button>
            <button type="button" data-snake-dir="1,0">右</button>
            <button type="button" data-snake-dir="0,1">下</button>
          </div>
          <div class="game-actions">
            <button id="restartSnakeButton" type="button">重新开始</button>
            <button id="pauseSnakeButton" type="button">暂停</button>
            <p id="snakeHint">方向键或滑动控制，吃到苹果会加速。</p>
          </div>
        </article>
      </section>

      <section class="video-overlay hidden" id="videoOverlay" aria-label="Video Feed">
        <article class="video-shell">
          <header class="video-head">
            <div>
              <span>Video Feed</span>
              <h2>YouTube</h2>
            </div>
            <button id="closeVideoButton" type="button">关闭</button>
          </header>
          <form class="video-add" id="videoAddForm">
            <input id="videoUrlInput" placeholder="粘贴 YouTube 链接，或输入关键词搜索" autocomplete="off" />
            <button class="primary" type="submit">加入/搜索</button>
          </form>
          <div class="video-categories" id="videoCategories" aria-label="视频分类">
            <button type="button" data-video-query="creative coding">全部</button>
            <button type="button" data-video-query="music">音乐</button>
            <button type="button" data-video-query="gaming">游戏</button>
            <button type="button" data-video-query="sports">体育</button>
            <button type="button" data-video-query="travel">旅行</button>
            <button type="button" data-video-query="animation">动画</button>
            <button type="button" data-video-query="technology">科技</button>
            <button type="button" data-video-query="learning">学习</button>
          </div>
          <div class="video-feed" id="videoFeed"></div>
          <div class="video-actions">
            <button id="prevVideoButton" type="button">上一条</button>
            <button id="nextVideoButton" type="button">下一条</button>
            <button id="loadMoreVideosButton" type="button">加载更多</button>
            <button id="resetVideosButton" type="button">重置</button>
          </div>
        </article>
      </section>

      <section class="map-overlay hidden" id="mapOverlay" aria-label="Google Maps">
        <article class="map-shell">
          <header class="video-head">
            <div>
              <span>Google</span>
              <h2>Maps</h2>
            </div>
            <button id="closeMapButton" type="button">关闭</button>
          </header>
          <form class="video-add" id="mapSearchForm">
            <input id="mapSearchInput" placeholder="搜索地点，例如 Tokyo Tower" autocomplete="off" />
            <button class="primary" type="submit">搜索</button>
          </form>
          <iframe
            id="mapFrame"
            title="Google Maps"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps?q=Tokyo&output=embed"
          ></iframe>
        </article>
      </section>

      <div class="toast" id="toast" hidden></div>
    </main>

    <script src="app.js?v=13"></script>
  </body>
</html>
