<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css?v=6" />
  </head>
  <body>
    <main class="app">
      <section class="auth-screen" id="authScreen">
        <div class="auth-card">
          <div class="logo" aria-hidden="true">M</div>
          <h1>Mini Chat</h1>
          <p>注册或登录账号，在同一个网络里的其他设备也可以进入聊天。</p>
          <form id="authForm">
            <input id="nameInput" name="name" autocomplete="nickname" placeholder="昵称（注册时填写）" />
            <input id="usernameInput" name="username" autocomplete="username" placeholder="账号，例如 qz" required />
            <input id="passwordInput" name="password" autocomplete="current-password" type="password" placeholder="密码，至少 4 位" required />
            <div class="auth-actions">
              <button class="primary" type="submit" data-action="login">登录</button>
              <button type="button" id="registerButton">注册</button>
            </div>
          </form>
          <p class="hint" id="authHint">账号只能用英文、数字和下划线。</p>
        </div>
      </section>

      <section class="chat-shell hidden" id="chatShell">
        <aside class="sidebar">
          <header class="profile">
            <div class="avatar" id="myAvatar">M</div>
            <div>
              <strong id="myName">Mini</strong>
              <span id="myUsername">@mini</span>
            </div>
            <button id="logoutButton" type="button">退出</button>
          </header>

          <form class="add-contact" id="addContactForm">
            <input id="contactInput" placeholder="输入账号加好友" autocomplete="off" />
            <button type="submit">添加</button>
          </form>

          <form class="group-form" id="groupForm">
            <input id="groupNameInput" placeholder="群名" autocomplete="off" />
            <input id="groupMembersInput" placeholder="成员账号，用逗号分隔" autocomplete="off" />
            <button type="submit">建群</button>
          </form>

          <section class="wallpaper-panel" aria-label="壁纸设置">
            <div class="section-title">壁纸</div>
            <div class="wallpaper-grid" id="wallpaperGrid">
              <button type="button" data-wallpaper="aurora">极光</button>
              <button type="button" data-wallpaper="mist">薄雾</button>
              <button type="button" data-wallpaper="sunset">日落</button>
              <button type="button" data-wallpaper="plain">纯色</button>
            </div>
            <label class="file-wallpaper">
              <input id="wallpaperFileInput" type="file" accept="image/*" />
              <span>选择自己的图片</span>
            </label>
          </section>

          <section class="game-panel" aria-label="小游戏">
            <div class="section-title">小游戏</div>
            <button class="mini-game-button" id="openGameButton" type="button">
              <span>Fruit Slasher</span>
              <small>30 秒切水果</small>
            </button>
          </section>

          <div class="section-title">会话</div>
          <div class="contacts" id="threads"></div>
        </aside>

        <section class="conversation">
          <header class="chat-head">
            <button class="back-button" id="backButton" type="button">‹</button>
            <div class="avatar small" id="peerAvatar">?</div>
            <div>
              <strong id="peerName">选择一个联系人</strong>
              <span id="peerStatus">消息会自动刷新</span>
            </div>
          </header>

          <div class="messages empty" id="messages">
            <div class="empty-state">
              <strong>开始聊天</strong>
              <span>添加一个账号，或选择左侧联系人。</span>
            </div>
          </div>

          <form class="composer" id="messageForm">
            <button class="sticker-toggle" id="stickerToggle" type="button" disabled>表情</button>
            <input id="messageInput" placeholder="输入消息" autocomplete="off" disabled />
            <button class="primary" type="submit" disabled id="sendButton">发送</button>
          </form>
          <div class="sticker-panel hidden" id="stickerPanel" aria-label="表情包"></div>
        </section>
      </section>

      <section class="game-overlay hidden" id="gameOverlay" aria-label="Fruit Slasher mini game">
        <article class="game-card">
          <div class="game-head">
            <div>
              <span>Mini Game</span>
              <h2>Fruit Slasher</h2>
            </div>
            <button id="closeGameButton" type="button">关闭</button>
          </div>
          <div class="game-stats">
            <div><span>分数</span><strong id="gameScore">0</strong></div>
            <div><span>时间</span><strong id="gameTime">30</strong></div>
            <div><span>连击</span><strong id="gameCombo">x1</strong></div>
          </div>
          <canvas id="fruitGame" width="720" height="420" aria-label="Fruit Slasher canvas"></canvas>
          <div class="game-actions">
            <button id="restartGameButton" type="button">重新开始</button>
            <p id="gameHint">拖动鼠标或手指划过水果，避开炸弹。</p>
          </div>
        </article>
      </section>

      <div class="toast" id="toast" hidden></div>
    </main>

    <script src="app.js?v=6"></script>
  </body>
</html>
